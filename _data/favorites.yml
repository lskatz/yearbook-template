# =============================================================================
# STUDENT FAVORITES SURVEY — one entry per student
# =============================================================================
#
# id      — must match a person ID in _data/people.yml (required)
# subject — favorite school subject (optional)
# book    — favorite book this year (optional)
# lunch   — favorite lunch from the cafeteria (optional)
# memory  — favorite memory from the school year (optional)
#
# To add a student: copy any block below and change `id` to their person ID.
# To add a new question: add a new field (e.g. `sport:`) to each entry here,
#   then add a matching <dt>/<dd> pair in _layouts/favorites.html.
# =============================================================================

