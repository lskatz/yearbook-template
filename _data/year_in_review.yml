# =============================================================================
# YEAR IN REVIEW — edit to match your school year
# =============================================================================
#
# school_year — shown as the subtitle on the page, e.g. "2025–2026"
# sections    — list of themed boxes, each with:
#     title   — box heading
#     icon    — any emoji (displayed before the title)
#     items   — bullet list of things to remember from the year
#
# To add a section: add a new `- title:` block under `sections:`.
# To remove a section: delete its block.
# To reorder: drag the blocks into a new order.
# =============================================================================

