# =============================================================================
# PEOPLE DIRECTORY — the master list of everyone in the yearbook
# =============================================================================
#
# This is the ONLY place a person's name and photo are defined. Classes, clubs,
# sports, and staff pages all reference people by their `id` below.
#
# MINIMUM fields for each person:
#   id:    kebab-case-unique-id  (also used as default photo filename)
#   first: First name
#   last:  Last name
#
# OPTIONAL:
#   nickname: "Goes by..."
#   pronouns: "she/her" | "he/him" | "they/them"
#   role:     "student" | "teacher" | "staff"   (default: student)
#   grade:    PK | K | 1 | 2 | 3 | 4 | 5        (students only)
#   title:    "Principal" | "School Nurse"       (staff only)
#   quote:    "Something they said this year."   (nice for 5th graders)
#   photo:    "/assets/images/people/custom.png" (override default path)
#
# PHOTO CONVENTION:
#   Save as  assets/images/people/<id>.jpg
#   e.g. id: malcolm-wilkerson  →  assets/images/people/malcolm-wilkerson.jpg
#   If the file is missing, a placeholder with initials is shown automatically.
# =============================================================================

