<!--
  favicon.svg — browser tab / bookmark icon
  ==========================================
  This is a heraldic shield design with a school initial.

  To customize:
    • School color : change the `fill` on the first <path> (shield body)
    • Letter       : change the character inside <text> to your school initial
    • Border ring  : change the `stroke` on the second <path> for a different highlight
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Shield body -->
  <path d="M16 2 L29 5.5 L29 19.5 Q29 28 16 31 Q3 28 3 19.5 L3 5.5 Z"
        fill="#7b2d1e"/>
  <!-- Inner border ring (subtle highlight) -->
  <path d="M16 4.5 L27 7.5 L27 19.5 Q27 26.5 16 29 Q5 26.5 5 19.5 L5 7.5 Z"
        fill="none" stroke="rgba(244,239,229,0.45)" stroke-width="0.9"/>
  <!-- Small diamond ornaments at upper shield corners -->
  <path d="M8 8.5 L9.5 10.5 L8 12.5 L6.5 10.5 Z"
        fill="rgba(244,239,229,0.65)"/>
  <path d="M24 8.5 L25.5 10.5 L24 12.5 L22.5 10.5 Z"
        fill="rgba(244,239,229,0.65)"/>
  <!-- School initial — change "Y" to your school's letter -->
  <text x="16" y="23" text-anchor="middle"
        font-family="Georgia, serif" font-size="14" font-weight="bold"
        fill="#f4efe5">Y</text>
</svg>
