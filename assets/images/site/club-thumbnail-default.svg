<?xml version="1.0" encoding="UTF-8"?>
<!--
  club-thumbnail-default.svg — Default club-page banner image
  ============================================================
  Shown at the top of every club page that does NOT set a
  `thumbnail:` field in its front-matter.

  To use a real photo for one club, add to that club's .md file:
    thumbnail: "/assets/images/groups/my-club.jpg"

  To change the default for ALL clubs at once, update _config.yml:
    club_thumbnail_default: "/assets/images/site/club-thumbnail-default.svg"

  To change the accent colour, edit the values that reference "#2f6a3a" below.

  Recommended image size: 800 × 300 px (landscape, 8:3 ratio).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 300" width="800" height="300"
     role="img" aria-label="Club photo placeholder">
  <title>Club Photo Placeholder</title>

  <!-- ── Background — soft sage ── -->
  <rect width="800" height="300" fill="#edf4ee"/>

  <!-- ── Top accent band ── -->
  <rect x="0" y="0" width="800" height="44" fill="#2f6a3a"/>
  <!-- ── Bottom accent band ── -->
  <rect x="0" y="256" width="800" height="44" fill="#2f6a3a"/>

  <!-- ── Thin rule lines inside accent bands ── -->
  <line x1="0" y1="40" x2="800" y2="40" stroke="#edf4ee" stroke-width="0.8" opacity="0.35"/>
  <line x1="0" y1="260" x2="800" y2="260" stroke="#edf4ee" stroke-width="0.8" opacity="0.35"/>

  <!-- ── Dashed inner content border ── -->
  <rect x="16" y="52" width="768" height="196" rx="2"
        fill="none" stroke="#aac8ad" stroke-width="1" stroke-dasharray="7 4"/>

  <!-- ── Corner accent marks ── -->
  <g stroke="#2f6a3a" stroke-width="2" fill="none" opacity="0.55">
    <path d="M16 72 L16 52 L36 52"/>
    <path d="M784 72 L784 52 L764 52"/>
    <path d="M16 228 L16 248 L36 248"/>
    <path d="M784 228 L784 248 L764 248"/>
  </g>

  <!-- ── Club silhouette: 6 figures arranged in a ring ── -->
  <!-- The ring suggests a meeting / gathering -->
  <g fill="#2f6a3a" opacity="0.22">
    <!-- Top -->
    <ellipse cx="400" cy="108" rx="20" ry="20"/>
    <rect    x="380" y="126" width="40" height="40" rx="20"/>
    <!-- Top-right -->
    <ellipse cx="520" cy="133" rx="20" ry="20"/>
    <rect    x="500" y="151" width="40" height="40" rx="20"/>
    <!-- Bottom-right -->
    <ellipse cx="488" cy="210" rx="20" ry="20"/>
    <rect    x="468" y="228" width="40" height="44" rx="20"/>
    <!-- Bottom -->
    <ellipse cx="400" cy="228" rx="20" ry="20"/>
    <rect    x="380" y="246" width="40" height="10" rx="10"/>
    <!-- Bottom-left -->
    <ellipse cx="312" cy="210" rx="20" ry="20"/>
    <rect    x="292" y="228" width="40" height="44" rx="20"/>
    <!-- Top-left -->
    <ellipse cx="280" cy="133" rx="20" ry="20"/>
    <rect    x="260" y="151" width="40" height="40" rx="20"/>
  </g>

  <!-- ── Connecting arc hints (subtle circle-of-people line) ── -->
  <circle cx="400" cy="168" r="82"
          fill="none" stroke="#2f6a3a" stroke-width="0.8" stroke-dasharray="5 6" opacity="0.2"/>

  <!-- ── Small puzzle-piece icon in the centre ── -->
  <g fill="#2f6a3a" opacity="0.18" transform="translate(385,153)">
    <path d="M0 0 h12 q0-5 5-5 q5 0 5 5 h12 v12 q5 0 5 5 q0 5-5 5 v12 H22 q0 5-5 5 q-5 0-5-5 H0 v-12 q-5 0-5-5 q0-5 5-5 Z"/>
  </g>

  <!-- ── Label in top accent band ── -->
  <text x="400" y="27"
        font-family="Georgia, serif" font-size="17" font-weight="bold"
        fill="#f4efe5" text-anchor="middle" dominant-baseline="middle">Club Photo</text>

  <!-- ── Replacement hint in bottom accent band ── -->
  <text x="400" y="271"
        font-family="sans-serif" font-size="10.5" fill="#f4efe5"
        text-anchor="middle" dominant-baseline="middle" opacity="0.85">
    Add  thumbnail: "/assets/images/groups/my-club.jpg"  in the club front-matter
  </text>
</svg>

