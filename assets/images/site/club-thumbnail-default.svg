<?xml version="1.0" encoding="UTF-8"?>
<!--
  Default club thumbnail — shown on every club page that does NOT set a
  `thumbnail:` field in its front-matter.

  To use a custom photo for a specific club, add to that club's .md file:

    thumbnail: "/assets/images/groups/chess-club.jpg"

  To change the default for ALL clubs at once, update `club_thumbnail_default`
  in _config.yml to point to your preferred image file.

  Recommended image size: 800 × 300 px (landscape, 8:3 ratio).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 300" width="800" height="300"
     role="img" aria-label="Club photo placeholder">
  <title>Club Photo Placeholder</title>

  <!-- Background — soft green tint -->
  <rect width="800" height="300" fill="#edf4ee"/>
  <rect x="2" y="2" width="796" height="296" rx="2"
        fill="none" stroke="#aac8ad" stroke-width="2"/>

  <!-- Subtle inner fill -->
  <rect x="12" y="12" width="776" height="276" rx="2" fill="#ddeedd"/>

  <!-- Figures gathered in a circle (club meeting silhouette) -->
  <g fill="#3a7d44" opacity="0.25">
    <!-- top -->
    <ellipse cx="400" cy="120" rx="22" ry="22"/>
    <rect x="378" y="140" width="44" height="44" rx="22"/>
    <!-- top-right -->
    <ellipse cx="530" cy="148" rx="22" ry="22"/>
    <rect x="508" y="168" width="44" height="44" rx="22"/>
    <!-- bottom-right -->
    <ellipse cx="490" cy="220" rx="22" ry="22"/>
    <rect x="468" y="240" width="44" height="44" rx="22"/>
    <!-- bottom-left -->
    <ellipse cx="310" cy="220" rx="22" ry="22"/>
    <rect x="288" y="240" width="44" height="44" rx="22"/>
    <!-- top-left -->
    <ellipse cx="270" cy="148" rx="22" ry="22"/>
    <rect x="248" y="168" width="44" height="44" rx="22"/>
  </g>

  <!-- Label -->
  <text x="400" y="58"
        font-family="Georgia, serif"
        font-size="20"
        font-weight="bold"
        fill="#1c2e1e"
        text-anchor="middle">Club Photo</text>

  <!-- Replacement hint -->
  <text x="400" y="84"
        font-family="sans-serif"
        font-size="12"
        fill="#4a6b4e"
        text-anchor="middle">Add  thumbnail: "/assets/images/groups/my-club.jpg"  to the club front-matter</text>
  <text x="400" y="102"
        font-family="sans-serif"
        font-size="11"
        fill="#6a9b6e"
        text-anchor="middle">or update club_thumbnail_default in _config.yml to change the default for all clubs</text>
</svg>
