<?xml version="1.0" encoding="UTF-8"?>
<!--
  sport-thumbnail-default.svg — Default sport-page banner image
  =============================================================
  Shown at the top of every sport page that does NOT set a
  `thumbnail:` field in its front-matter.

  To use a real photo for one sport, add to that sport's .md file:
    thumbnail: "/assets/images/groups/my-sport.jpg"

  To change the default for ALL sports at once, update _config.yml:
    sport_thumbnail_default: "/assets/images/site/sport-thumbnail-default.svg"

  To change the accent colour, edit the values that reference "#1a3a6a" below.

  Recommended image size: 800 × 300 px (landscape, 8:3 ratio).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 300" width="800" height="300"
     role="img" aria-label="Team photo placeholder">
  <title>Team Photo Placeholder</title>

  <!-- ── Background — sky blue ── -->
  <rect width="800" height="300" fill="#eaf2fb"/>

  <!-- ── Top accent band ── -->
  <rect x="0" y="0" width="800" height="44" fill="#1a3a6a"/>
  <!-- ── Bottom accent band ── -->
  <rect x="0" y="256" width="800" height="44" fill="#1a3a6a"/>

  <!-- ── Thin rule lines inside accent bands ── -->
  <line x1="0" y1="40" x2="800" y2="40" stroke="#eaf2fb" stroke-width="0.8" opacity="0.35"/>
  <line x1="0" y1="260" x2="800" y2="260" stroke="#eaf2fb" stroke-width="0.8" opacity="0.35"/>

  <!-- ── Dashed inner content border ── -->
  <rect x="16" y="52" width="768" height="196" rx="2"
        fill="none" stroke="#a0bfd8" stroke-width="1" stroke-dasharray="7 4"/>

  <!-- ── Corner accent marks ── -->
  <g stroke="#1a3a6a" stroke-width="2" fill="none" opacity="0.55">
    <path d="M16 72 L16 52 L36 52"/>
    <path d="M784 72 L784 52 L764 52"/>
    <path d="M16 228 L16 248 L36 248"/>
    <path d="M784 228 L784 248 L764 248"/>
  </g>

  <!-- ── Team photo silhouette: back row standing, front row kneeling ── -->
  <!-- Back row (7 figures) -->
  <g fill="#1a3a6a" opacity="0.20">
    <ellipse cx="90"  cy="146" rx="17" ry="17"/>
    <rect    x="73"  y="161" width="34" height="40" rx="17"/>
    <ellipse cx="190" cy="146" rx="17" ry="17"/>
    <rect    x="173" y="161" width="34" height="40" rx="17"/>
    <ellipse cx="290" cy="146" rx="17" ry="17"/>
    <rect    x="273" y="161" width="34" height="40" rx="17"/>
    <ellipse cx="400" cy="146" rx="17" ry="17"/>
    <rect    x="383" y="161" width="34" height="40" rx="17"/>
    <ellipse cx="510" cy="146" rx="17" ry="17"/>
    <rect    x="493" y="161" width="34" height="40" rx="17"/>
    <ellipse cx="610" cy="146" rx="17" ry="17"/>
    <rect    x="593" y="161" width="34" height="40" rx="17"/>
    <ellipse cx="710" cy="146" rx="17" ry="17"/>
    <rect    x="693" y="161" width="34" height="40" rx="17"/>
  </g>

  <!-- Front row kneeling (5 figures, squatter shape) -->
  <g fill="#0d1f40" opacity="0.16">
    <ellipse cx="145" cy="200" rx="20" ry="16"/>
    <rect    x="125" y="214" width="40" height="30" rx="16"/>
    <ellipse cx="275" cy="200" rx="20" ry="16"/>
    <rect    x="255" y="214" width="40" height="30" rx="16"/>
    <ellipse cx="400" cy="200" rx="20" ry="16"/>
    <rect    x="380" y="214" width="40" height="30" rx="16"/>
    <ellipse cx="525" cy="200" rx="20" ry="16"/>
    <rect    x="505" y="214" width="40" height="30" rx="16"/>
    <ellipse cx="655" cy="200" rx="20" ry="16"/>
    <rect    x="635" y="214" width="40" height="30" rx="16"/>
  </g>

  <!-- ── Laurel wreath framing the centre of the image ── -->
  <!-- Left branch arc (simplified as repeated leaf ovals) -->
  <g fill="#1a3a6a" opacity="0.14" transform="translate(305,148)">
    <ellipse cx="-18" cy="-38" rx="7" ry="12" transform="rotate(-55,-18,-38)"/>
    <ellipse cx="-28" cy="-18" rx="7" ry="12" transform="rotate(-80,-28,-18)"/>
    <ellipse cx="-30" cy="4"   rx="7" ry="12" transform="rotate(-100,-30,4)"/>
    <ellipse cx="-24" cy="26"  rx="7" ry="12" transform="rotate(-125,-24,26)"/>
    <ellipse cx="-10" cy="44"  rx="7" ry="12" transform="rotate(-150,-10,44)"/>
  </g>
  <!-- Right branch arc -->
  <g fill="#1a3a6a" opacity="0.14" transform="translate(495,148)">
    <ellipse cx="18"  cy="-38" rx="7" ry="12" transform="rotate(55,18,-38)"/>
    <ellipse cx="28"  cy="-18" rx="7" ry="12" transform="rotate(80,28,-18)"/>
    <ellipse cx="30"  cy="4"   rx="7" ry="12" transform="rotate(100,30,4)"/>
    <ellipse cx="24"  cy="26"  rx="7" ry="12" transform="rotate(125,24,26)"/>
    <ellipse cx="10"  cy="44"  rx="7" ry="12" transform="rotate(150,10,44)"/>
  </g>

  <!-- ── Label in top accent band ── -->
  <text x="400" y="27"
        font-family="Georgia, serif" font-size="17" font-weight="bold"
        fill="#eaf2fb" text-anchor="middle" dominant-baseline="middle">Team Photo</text>

  <!-- ── Replacement hint in bottom accent band ── -->
  <text x="400" y="271"
        font-family="sans-serif" font-size="10.5" fill="#eaf2fb"
        text-anchor="middle" dominant-baseline="middle" opacity="0.85">
    Add  thumbnail: "/assets/images/groups/my-sport.jpg"  in the sport front-matter
  </text>
</svg>

