<?xml version="1.0" encoding="UTF-8"?>
<!--
  Default photo-page thumbnail — shown on the home page index card for every
  photo page that does NOT set a `thumbnail:` field in its front-matter.

  To use a custom thumbnail for a specific photo page, add to that page's
  .md file:

    thumbnail: "/assets/images/photos/my-event-thumb.jpg"

  To change the default for ALL photo pages at once, update
  `photo_thumbnail_default` in _config.yml to point to your preferred image.

  Recommended image size: 800 × 300 px (landscape, 8:3 ratio).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 300" width="800" height="300"
     role="img" aria-label="Photo page placeholder">
  <title>Photo Page Placeholder</title>

  <!-- Background — warm amber tint to evoke a photo album -->
  <rect width="800" height="300" fill="#f5eedc"/>
  <rect x="2" y="2" width="796" height="296" rx="2"
        fill="none" stroke="#c9ae7a" stroke-width="2"/>

  <!-- Subtle inner fill -->
  <rect x="12" y="12" width="776" height="276" rx="2" fill="#ecdfc0"/>

  <!-- Stylised overlapping photo-frame silhouettes -->
  <g opacity="0.25">
    <!-- large frame centre -->
    <rect x="300" y="80" width="200" height="150" rx="4" fill="#7b5c1e"/>
    <!-- small frame top-left -->
    <rect x="210" y="110" width="130" height="98" rx="4" fill="#7b5c1e"/>
    <!-- small frame top-right -->
    <rect x="460" y="100" width="130" height="98" rx="4" fill="#7b5c1e"/>
    <!-- mount lines on large frame -->
    <rect x="308" y="88"  width="184" height="134" rx="2" fill="none"
          stroke="#7b5c1e" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Camera lens icon (circle + inner ring) -->
  <g fill="none" stroke="#7b5c1e" stroke-width="3" opacity="0.3">
    <circle cx="400" cy="155" r="28"/>
    <circle cx="400" cy="155" r="14"/>
  </g>

  <!-- Label -->
  <text x="400" y="58"
        font-family="Georgia, serif"
        font-size="20"
        font-weight="bold"
        fill="#3d2a00"
        text-anchor="middle">Photo Page</text>

  <!-- Replacement hint -->
  <text x="400" y="84"
        font-family="sans-serif"
        font-size="12"
        fill="#6b4e1a"
        text-anchor="middle">Add  thumbnail: "/assets/images/photos/my-event.jpg"  to the page front-matter</text>
  <text x="400" y="102"
        font-family="sans-serif"
        font-size="11"
        fill="#8a6a30"
        text-anchor="middle">or update photo_thumbnail_default in _config.yml to change the default for all photo pages</text>
</svg>
