<?xml version="1.0" encoding="UTF-8"?>
<!--
  Group photo placeholder for: Baseball Team
  =====================================================================
  This is a placeholder image. To customise this yearbook for your
  school, replace this file with an actual group photo:

    assets/images/groups/baseball.jpg   (or .png / .svg — any format)

  Update the `group_photo:` path in the matching .md file if you change
  the file extension. The `photo_annotation:` list in that same file
  controls the names shown in the caption below the photo.
  =====================================================================
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 400"
     width="800" height="400"
     role="img"
     aria-label="Baseball Team group photo placeholder">
  <title>Baseball Team — Group Photo Placeholder</title>

  <!-- Background -->
  <rect width="800" height="400" fill="#f4efe5"/>
  <rect x="2" y="2" width="796" height="396" rx="2"
        fill="none" stroke="#cdbfa5" stroke-width="2"/>

  <!-- Subtle grid lines to suggest a photo background -->
  <rect x="20" y="20" width="760" height="360" rx="2" fill="#ebe4d3"/>

  <!-- Person silhouettes -->
<g transform="translate(110,160)" opacity="0.55"><ellipse rx="18" ry="18" cy="-36" fill="#9b8050"/><rect x="-20" y="-18" width="40" height="50" rx="4" fill="#9b8050"/></g>
<g transform="translate(230,160)" opacity="0.55"><ellipse rx="18" ry="18" cy="-36" fill="#9b8050"/><rect x="-20" y="-18" width="40" height="50" rx="4" fill="#9b8050"/></g>
<g transform="translate(350,160)" opacity="0.55"><ellipse rx="18" ry="18" cy="-36" fill="#9b8050"/><rect x="-20" y="-18" width="40" height="50" rx="4" fill="#9b8050"/></g>
<g transform="translate(470,160)" opacity="0.55"><ellipse rx="18" ry="18" cy="-36" fill="#9b8050"/><rect x="-20" y="-18" width="40" height="50" rx="4" fill="#9b8050"/></g>
<g transform="translate(590,160)" opacity="0.55"><ellipse rx="18" ry="18" cy="-36" fill="#9b8050"/><rect x="-20" y="-18" width="40" height="50" rx="4" fill="#9b8050"/></g>
<g transform="translate(710,160)" opacity="0.55"><ellipse rx="18" ry="18" cy="-36" fill="#9b8050"/><rect x="-20" y="-18" width="40" height="50" rx="4" fill="#9b8050"/></g>


  <!-- Ground line -->
  <line x1="60" y1="230" x2="740" y2="230"
        stroke="#cdbfa5" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- Label -->
  <text x="400" y="300"
        font-family="Georgia, serif"
        font-size="22"
        font-weight="bold"
        fill="#1c1a17"
        text-anchor="middle">Baseball Team</text>

  <!-- Replacement hint -->
  <text x="400" y="330"
        font-family="sans-serif"
        font-size="13"
        fill="#5b544a"
        text-anchor="middle">Replace this file with a real photo</text>
  <text x="400" y="348"
        font-family="sans-serif"
        font-size="11"
        fill="#9b8050"
        text-anchor="middle">assets/images/groups/baseball.jpg</text>
</svg>
