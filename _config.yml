# =============================================================================
#  JEKYLL SITE CONFIG
# =============================================================================
#  Edit this file to customize site-wide settings without touching any HTML.
#  After any change, commit and push — GitHub Actions will rebuild the site.
# =============================================================================


# -----------------------------------------------------------------------------
# 1. SITE IDENTITY — the basics for your school
# -----------------------------------------------------------------------------
title: "North Hollywood Elementary Yearbook"
description: "2025–2026 school year"
school_year: "2025–2026"
mascot: "The Krelboynes"

# The public URL of this yearbook's GitHub repository. Shown on the /help/
# page so visitors who want to create their own yearbook can find the template.
# Update this to your own fork's URL after you use the template.
github_repo: "https://github.com/lskatz/yearbook-template"
template_version: "0.02"

# If your site is deployed at https://your-org.github.io (no subpath), leave
# both of these empty. If it's at https://your-org.github.io/yearbook/, set
# baseurl to "/yearbook".
url: "https://lskatz.github.io"
baseurl: "/yearbook-template"


# -----------------------------------------------------------------------------
# 2. LABELS — all user-facing English strings in one place
# -----------------------------------------------------------------------------
# Change these if your school uses different terminology (e.g. "Section" vs.
# "Class", "Pupils" vs. "Students"), or translate them for a non-English site.
# The layouts all read from here, so one edit updates every page.
#
# To add more customizable strings: (a) add them here, (b) reference them in
# the layout as {{ site.labels.your_new_key }}.
# -----------------------------------------------------------------------------
labels:
  # Navigation bar (see _includes/header.html)
  nav_classes:   "Classes"
  nav_clubs:     "Clubs"
  nav_sports:    "Sports"
  nav_staff:     "Staff"
  nav_photos:    "Photos"
  nav_help:      "Help"

  # "Eyebrow" text — small all-caps label above page titles
  eyebrow_class: "Class"
  eyebrow_club:  "Club"
  eyebrow_sport: "Team"
  eyebrow_staff: "Staff"
  eyebrow_photo_page: "Photos"

  # Roster section headings (singular used when only 1, plural for 2+)
  teachers_one:  "Teacher"
  teachers_many: "Teachers"
  students:      "Students"
  advisors_one:  "Advisor"
  advisors_many: "Advisors"
  members:       "Members"
  coaches_one:   "Coach"
  coaches_many:  "Coaches"
  roster:        "Roster"

  # Profile page: the "Appears in: Chess Club, Soccer Team" section
  appears_in:    "Appears in"

  # Home page section headings
  section_classes: "Classes"
  section_clubs:   "Clubs"
  section_sports:  "Sports"
  section_photos:  "Photos"

  # Search box placeholder
  search_placeholder: "Search a name…"


# -----------------------------------------------------------------------------
# 3. PHOTO CONVENTIONS
# -----------------------------------------------------------------------------
# Where photos live by convention. A student named jane-smith in
# _data/people.yml will have her photo at /assets/images/people/jane-smith.jpg
# by default. Override individual cases with a `photo:` field in people.yml.
# -----------------------------------------------------------------------------
photo_path_default: "/assets/images/people/{id}.jpg"
photo_placeholder:  "/assets/images/site/placeholder.svg"

# Default thumbnail shown at the top of every class page.
# Override for a specific class by adding  thumbnail: "/path/to/photo.jpg"
# to that class's front-matter. Recommended size: 800 × 300 px.
class_thumbnail_default: "/assets/images/site/class-thumbnail-default.svg"

# Default thumbnails shown at the top of club and sport pages (and on the home
# page index). Override per page with  thumbnail: "/path/to/photo.jpg"  in
# the page's front-matter, or set to "" to suppress the thumbnail entirely.
club_thumbnail_default:  "/assets/images/site/club-thumbnail-default.svg"
sport_thumbnail_default: "/assets/images/site/sport-thumbnail-default.svg"

# Default thumbnail shown on photo-page cards on the home page index.
# Override per page with  thumbnail: "/path/to/photo.jpg"  in the page's
# front-matter, or set to "" to suppress the thumbnail for a specific page.
photo_thumbnail_default: "/assets/images/site/photo-thumbnail-default.svg"


# =============================================================================
#  EVERYTHING BELOW IS JEKYLL MACHINERY — you probably don't need to edit it.
# =============================================================================

markdown: kramdown
highlighter: rouge
permalink: /:collection/:slug/

# Publish collection documents (e.g. photo pages) whose `date:` field is in
# the future. Without this, Jekyll silently skips writing those pages at build
# time, causing 404s for upcoming-event photo pages.
future: true

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections: each corresponds to a folder (_classes, _clubs, etc.) whose
# Markdown files become pages. The `people` collection is populated by the
# custom Ruby plugin in _plugins/people_generator.rb.
collections:
  classes:
    output: true
    permalink: /classes/:slug/
  clubs:
    output: true
    permalink: /clubs/:slug/
  sports:
    output: true
    permalink: /sports/:slug/
  photos:
    output: true
    permalink: /photos/:slug/
  people:
    output: true
    permalink: /people/:slug/

# Default layouts — saves us from writing `layout: class` in every class file.
defaults:
  - scope: { path: "", type: "classes" }
    values: { layout: "class" }
  - scope: { path: "", type: "clubs" }
    values: { layout: "club" }
  - scope: { path: "", type: "sports" }
    values: { layout: "sport" }
  - scope: { path: "", type: "photos" }
    values: { layout: "photo-page" }
  - scope: { path: "", type: "people" }
    values: { layout: "person" }

# Files/folders excluded from the built site. `docs/` contains maintainer
# documentation meant only for editors of the repo, not the public site.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - scripts
  - tests
  - docs
  - README.md
  - pytest.ini
  - vendor
