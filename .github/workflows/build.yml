# Build with GitHub Actions instead of native Pages — this is what lets us use
# the custom `_plugins/people_generator.rb` plugin (native Pages only allows a
# whitelisted set of plugins, and ours isn't on it).
name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r tests/requirements.txt
      - run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Convert SVG photos to JPEG for the built site
        run: |
          npm install --no-save sharp
          node scripts/optimize-photos.js

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      # bundler-cache: true above already ran `bundle install` and cached gems;
      # running it again with a custom path would conflict, so we just verify.
      - name: Verify Ruby toolchain
        run: |
          ruby -v
          bundle -v
          bundle exec jekyll -v

      - uses: actions/configure-pages@v5
        id: pages

      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
