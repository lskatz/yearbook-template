# Auto-optimize any new photos committed to assets/images/people/.
# Resizes anything > 1200px wide, strips EXIF metadata (removes GPS etc.),
# converts to progressive JPEG, and commits the result back.
# SVG files are NOT processed here — they are converted to JPEG at build time
# by the Build & Deploy workflow so they remain as source files in the repo.
name: Optimize new photos

on:
  push:
    paths:
      - "assets/images/people/**.jpg"
      - "assets/images/people/**.jpeg"
      - "assets/images/people/**.png"
      - "assets/images/people/**.webp"

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with: { node-version: "20" }

      - name: Install sharp
        run: npm install --no-save sharp

      - name: Optimize
        run: node scripts/optimize-photos.js

      - name: Commit optimized images
        run: |
          git config user.name "yearbook-bot"
          git config user.email "actions@users.noreply.github.com"
          git add assets/images/people/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: optimize photos [skip ci]"
            git push
          fi
